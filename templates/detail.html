{% extends "base.html" %}

{% block contenido %}
<h1>{{ object.titulo }}</h1>
<h3>{{ object.subtitulo }}</h3>

<p>{{ object.contenido|safe }}</p>

{% if object.imagen %}
    <img src="{{ object.imagen.url }}" width="400">
{% endif %}

<p>Fecha: {{ object.fecha }}</p>

{% if user.is_authenticated %}
    <a href="{% url 'editar' object.id %}" class="btn btn-warning">Editar</a>
    <a href="{% url 'borrar' object.id %}" class="btn btn-danger">Eliminar</a>
{% endif %}

{% endblock %}
